<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d7a51"/>
      <stop offset="100%" stop-color="#1e5a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- خلفية مدورة -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#glow)"/>

  <!-- قبة مسجد -->
  <g transform="translate(256 280)">
    <!-- هلال علوي -->
    <path d="M 0 -150 Q -14 -160 -14 -178 Q -14 -196 0 -206 Q -6 -198 -6 -180 Q -6 -162 0 -150 Z" fill="#c8a36a"/>
    <!-- قبة -->
    <path d="M -90 0 Q -90 -110 0 -130 Q 90 -110 90 0 Z" fill="#ffffff" opacity="0.95"/>
    <!-- قاعدة -->
    <rect x="-100" y="-4" width="200" height="14" fill="#ffffff" opacity="0.95" rx="3"/>
    <!-- مئذنتان -->
    <rect x="-150" y="-90" width="22" height="120" fill="#ffffff" opacity="0.9" rx="4"/>
    <path d="M -150 -90 Q -139 -120 -128 -90 Z" fill="#c8a36a"/>
    <rect x="128" y="-90" width="22" height="120" fill="#ffffff" opacity="0.9" rx="4"/>
    <path d="M 128 -90 Q 139 -120 150 -90 Z" fill="#c8a36a"/>
    <!-- باب -->
    <path d="M -20 30 L -20 0 Q -20 -16 0 -16 Q 20 -16 20 0 L 20 30 Z" fill="#1e5a3a"/>
  </g>

  <!-- مسبحة عند الأسفل -->
  <g transform="translate(256 410)" fill="#c8a36a">
    <circle cx="-90" cy="0" r="9"/>
    <circle cx="-60" cy="0" r="9"/>
    <circle cx="-30" cy="0" r="9"/>
    <circle cx="0"   cy="0" r="11"/>
    <circle cx="30"  cy="0" r="9"/>
    <circle cx="60"  cy="0" r="9"/>
    <circle cx="90"  cy="0" r="9"/>
  </g>
</svg>
